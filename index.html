<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors — CV Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Intro screen -->
  <div id="screen-intro">
    <h1>Rock Paper Scissors</h1>
    <p class="subtitle">Play against the computer using your webcam.<br>Show ✊ ✋ or ✌️ and click "I'm Ready".</p>
    <button id="btn-start">Start Camera</button>
  </div>

  <!-- Game screen -->
  <div id="screen-game" class="hidden">
    <h1>Rock Paper Scissors</h1>
    <p class="subtitle">Play against the computer using your webcam.<br>Show ✊ ✋ or ✌️ and click "I'm Ready".</p>
    <div id="webcam-container">
      <div id="countdown" class="hidden"></div>
    </div>
    <button id="btn-ready">I'm Ready</button>
  </div>

  <!-- Result screen -->
  <div id="screen-result" class="hidden">
    <h1>Rock Paper Scissors</h1>
    <img id="result-photo" src="" alt="Your hand" />
    <p id="outcome"></p>
    <p id="details"></p>
    <button id="btn-again">Play Again</button>
  </div>

  <!--
    Scripts go at the bottom of the body, not the top.
    If you put them in the <head>, the browser tries to load and run them before
    the HTML elements exist yet — so getElementById() would find nothing.
    Putting them here means the page content is fully built before any JS runs.

    Order matters too:
    1. TensorFlow.js — the ML engine everything else depends on
    2. Teachable Machine — builds on top of TensorFlow.js, so it needs to load second
    3. app.js — our code, which uses both libraries above, so it loads last
  -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
